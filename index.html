<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Article Reader</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%8A%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: light dark;
      --accent: #6d5efc;
      --accent-2: #b14bf4;
      --accent-soft: color-mix(in srgb, var(--accent) 16%, transparent);
      --ring: color-mix(in srgb, var(--accent) 45%, transparent);
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 16px 56px;
      line-height: 1.55;
      background: radial-gradient(1100px 420px at 50% -160px,
        color-mix(in srgb, var(--accent) 24%, transparent), transparent);
    }
    .card {
      border: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
      border-radius: 18px;
      padding: 24px;
      background: color-mix(in srgb, Canvas 94%, var(--accent) 4%);
      box-shadow: 0 14px 44px rgb(0 0 0 / 0.12);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 30px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p.intro { margin: 0 0 20px; opacity: 0.75; }
    label { display: block; font-weight: 650; margin: 16px 0 7px; }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      font: inherit;
      border-radius: 11px;
      border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
      padding: 12px;
      background: Canvas;
      color: CanvasText;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--ring);
    }
    input[type="range"] {
      border: none; background: transparent; padding: 0;
      accent-color: var(--accent);
    }
    textarea { min-height: 150px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button {
      cursor: pointer;
      margin-top: 12px;
      font-weight: 700;
      border: none;
      transition: transform .05s ease, filter .15s ease, background .2s ease;
    }
    button:active { transform: translateY(1px); }
    button.primary {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #fff;
      box-shadow: 0 6px 18px var(--accent-soft);
    }
    button.primary:hover { filter: brightness(1.06); }
    #readTextButton { background: color-mix(in srgb, var(--accent) 12%, Canvas); color: CanvasText; }
    button:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }
    .controls { display: grid; grid-template-columns: 1fr 1fr 1.6fr 1fr; gap: 8px; margin-top: 14px; }
    button.toggle {
      font-size: 22px; line-height: 1; padding: 12px;
      background: color-mix(in srgb, var(--accent) 14%, Canvas);
      color: CanvasText;
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    }
    button.toggle:not(:disabled):hover { background: color-mix(in srgb, var(--accent) 24%, Canvas); }
    #playPauseButton:not(:disabled) {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #fff; border: none;
    }
    .premium, details.manual {
      margin-top: 16px;
      border: 1px solid color-mix(in srgb, CanvasText 14%, transparent);
      border-radius: 13px;
      padding: 12px 14px;
    }
    summary { font-weight: 650; cursor: pointer; }
    .premium .row { margin-top: 8px; }
    .premium .check {
      display: flex; align-items: center; gap: 8px;
      font-weight: 650; margin: 12px 0 4px;
    }
    .premium .check input { width: auto; }
    .premium input[type="password"] { margin-top: 6px; }
    /* Progress bar across the whole article. */
    #progress {
      margin-top: 14px;
      height: 6px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 16%, transparent);
      overflow: hidden;
      display: none;
    }
    #progress.active { display: block; }
    #progressBar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .3s ease;
    }
    #status {
      margin-top: 12px; min-height: 22px; font-weight: 600;
      color: var(--accent);
    }
    /* Reading view: shows the article split into chunks, highlighting the one
       currently being spoken and auto-scrolling it into view. */
    #reader {
      margin-top: 16px;
      max-height: 44vh;
      overflow-y: auto;
      padding: 4px;
      border-radius: 12px;
      display: none;
      scrollbar-width: thin;
    }
    #reader.active { display: block; }
    .chunk {
      display: block;
      padding: 10px 14px;
      margin: 6px 0;
      border-radius: 10px;
      border-left: 3px solid transparent;
      opacity: 0.55;
      cursor: pointer;
      transition: background .2s ease, opacity .2s ease;
    }
    .chunk:hover { opacity: 0.85; background: color-mix(in srgb, var(--accent) 8%, transparent); }
    .chunk.active {
      opacity: 1;
      background: var(--accent-soft);
      border-left-color: var(--accent);
      font-weight: 500;
    }
    /* Per-word highlight (browser engine where onboundary is supported). */
    .chunk .word-active {
      background: color-mix(in srgb, var(--accent) 38%, transparent);
      border-radius: 4px;
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent);
    }
    #eta {
      margin-top: 6px;
      min-height: 16px;
      font-size: 13px;
      opacity: 0.7;
      text-align: right;
    }
    @media (max-width: 620px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Article Reader</h1>
    <p class="intro">Paste an article URL. The page extracts the readable text and reads it aloud in a natural voice.</p>

    <label for="url">Article URL</label>
    <input id="url" type="url" placeholder="https://example.com/article" autocomplete="url" />

    <div class="row">
      <div>
        <label for="voice">Voice</label>
        <select id="voice"></select>
      </div>
      <div>
        <label for="rate">Speed: <span id="rateValue">1.0</span>x</label>
        <input id="rate" type="range" min="0.7" max="1.3" step="0.05" value="1" />
      </div>
    </div>

    <details class="premium" id="premiumSection">
      <summary>Premium voices</summary>
      <label class="check">
        <input type="checkbox" id="cfEnable" /> Use premium voice
      </label>
      <div class="row">
        <div>
          <label for="cfModel">Model</label>
          <select id="cfModel">
            <option value="melotts">MeloTTS — English (high volume)</option>
            <option value="aura-1">Aura-1 — natural voices</option>
            <option value="aura-2">Aura-2 — best quality</option>
          </select>
        </div>
        <div>
          <label for="cfVoice">Voice</label>
          <select id="cfVoice" disabled></select>
        </div>
      </div>
      <label for="cfKey">Access key</label>
      <input id="cfKey" type="password" placeholder="Your access key" autocomplete="off" />
    </details>

    <button class="primary" id="loadButton">Load and read</button>

    <div class="controls">
      <button id="restartButton" class="toggle" disabled aria-label="Restart from beginning" title="Restart from beginning">&#8634;</button>
      <button id="prevButton" class="toggle" disabled aria-label="Previous">&#9198;</button>
      <button id="playPauseButton" class="toggle" disabled aria-label="Play">&#9654;</button>
      <button id="nextButton" class="toggle" disabled aria-label="Next">&#9197;</button>
    </div>

    <div id="progress" aria-hidden="true"><div id="progressBar"></div></div>
    <div id="eta" aria-hidden="true"></div>

    <div id="status" aria-live="polite"></div>

    <div id="reader"></div>

    <details class="manual">
      <summary>Paste or edit text manually</summary>
      <label for="text">Article text</label>
      <textarea id="text" placeholder="Paste article text here, then press Read this text."></textarea>
      <button id="readTextButton">Read this text</button>
    </details>
  </main>

  <script>
    const urlInput = document.getElementById("url");
    const voiceSelect = document.getElementById("voice");
    const rateInput = document.getElementById("rate");
    const rateValue = document.getElementById("rateValue");
    const textArea = document.getElementById("text");
    const statusEl = document.getElementById("status");
    const readerEl = document.getElementById("reader");
    const progressEl = document.getElementById("progress");
    const progressBar = document.getElementById("progressBar");
    const etaEl = document.getElementById("eta");
    const loadButton = document.getElementById("loadButton");
    const readTextButton = document.getElementById("readTextButton");
    const restartButton = document.getElementById("restartButton");
    const prevButton = document.getElementById("prevButton");
    const playPauseButton = document.getElementById("playPauseButton");
    const nextButton = document.getElementById("nextButton");
    const cfEnable = document.getElementById("cfEnable");
    const cfModel = document.getElementById("cfModel");
    const cfVoice = document.getElementById("cfVoice");
    const cfKey = document.getElementById("cfKey");

    // Set this to your deployed Worker URL (see worker/README.md). Not secret —
    // the access key protects it.
    const CF_WORKER_URL = "https://article-reader-tts.article-reader.workers.dev";
    const CF_KEY_STORAGE = "cf_access_key";
    const PREFS_STORAGE = "ar_prefs";        // saved voice/speed/model choices
    const POS_STORAGE = "ar_positions";      // per-URL resume positions
    const POS_TTL_MS = 7 * 24 * 60 * 60 * 1000;  // forget resume points after 7 days
    const AUDIO_CACHE_MAX = 40;              // in-memory premium-audio cache cap
    // Curated, narration-friendly US voices only (no Irish/British/heavy accents).
    const AURA_VOICES = [
      "asteria", "luna", "stella", "hera",   // female
      "orion", "arcas", "perseus", "zeus",   // male
    ];
    const AURA2_VOICES = [
      "luna", "asteria", "aurora", "hera",   // female
      "apollo", "orion", "orpheus", "zeus",  // male
    ];
    const BROWSER_CHUNK = 1400;  // speechSynthesis: large chunks for smoothness
    const CF_CHUNK = 500;        // Cloudflare: smaller chunks cut first-audio latency
    const CHARS_PER_SEC = 15;    // rough TTS reading speed at rate 1.0, for ETA

    const PLAY_ICON = "▶";   // ▶
    const PAUSE_ICON = "⏸";  // ⏸
    let playbackState = "idle";   // "idle" | "playing" | "paused"
    let currentUtterance = null;  // browser engine guard
    let currentAudio = null;      // cloudflare engine <audio>
    let currentObjectUrl = null;  // cloudflare engine blob URL (to revoke)
    let cfPlayToken = 0;          // cloudflare async guard (discard stale fetches)

    let voices = [];
    let chunks = [];
    let chunkIndex = 0;
    let chunkEls = [];            // rendered chunk elements in the reading view
    let currentUrl = "";          // article URL for resume tracking ("" = pasted text)
    let articleTitle = "Article"; // for the lock-screen / media metadata
    const audioCache = new Map(); // key `${model}|${voice}|${text}` -> Blob (session only)

    // Per-word highlighting state (browser engine, where onboundary fires).
    let currentWordSpans = [];    // [{ start, end, el }] for the active chunk
    let wordSpanIndex = -1;       // which chunk currently has word spans

    function activeEngine() {
      return cfEnable.checked ? "cloudflare" : "browser";
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    // --- Persistence (preferences + resume position) -----------------------
    // localStorage has no built-in expiry, so prefs persist indefinitely.
    // Resume positions carry a timestamp and are pruned after POS_TTL_MS.

    function loadJson(key) {
      try { return JSON.parse(localStorage.getItem(key)) || {}; }
      catch { return {}; }
    }

    function savePrefs() {
      localStorage.setItem(PREFS_STORAGE, JSON.stringify({
        voice: voiceSelect.selectedOptions[0]?.textContent || "",
        rate: rateInput.value,
        cfEnable: cfEnable.checked,
        cfModel: cfModel.value,
        cfVoice: cfVoice.value,
      }));
    }

    function savePosition() {
      if (!currentUrl || !chunks.length) return;
      const all = loadJson(POS_STORAGE);
      all[currentUrl] = { index: chunkIndex, total: chunks.length, t: Date.now() };
      // Prune entries older than the TTL so the store can't grow forever.
      const now = Date.now();
      for (const k of Object.keys(all)) {
        if (now - (all[k].t || 0) > POS_TTL_MS) delete all[k];
      }
      localStorage.setItem(POS_STORAGE, JSON.stringify(all));
    }

    function getPosition(url) {
      const p = loadJson(POS_STORAGE)[url];
      if (!p || Date.now() - (p.t || 0) > POS_TTL_MS) return null;
      return p;
    }

    function clearPosition() {
      if (!currentUrl) return;
      const all = loadJson(POS_STORAGE);
      delete all[currentUrl];
      localStorage.setItem(POS_STORAGE, JSON.stringify(all));
    }

    // --- Premium audio cache (in-memory, this page session only) -----------

    function cfCacheKey(text) {
      return `${cfModel.value}|${cfVoice.value}|${text}`;
    }

    function cacheAudio(key, blob) {
      audioCache.set(key, blob);
      // Simple FIFO eviction once we exceed the cap.
      while (audioCache.size > AUDIO_CACHE_MAX) {
        audioCache.delete(audioCache.keys().next().value);
      }
    }

    // Warm the cache for the next chunk while the current one plays.
    function prefetchNext() {
      const next = chunkIndex + 1;
      if (next >= chunks.length) return;
      const key = `${cfModel.value}|${cfVoice.value}|${chunks[next]}`;
      if (audioCache.has(key)) return;
      fetchCfAudio(chunks[next]).catch(() => {});  // best effort; ignore errors
    }

    function loadVoices() {
      voices = speechSynthesis.getVoices();
      voiceSelect.innerHTML = "";

      // Voices to hide: macOS/Windows novelty/robotic voices, plus a few
      // natural ones the user opted out of (Tessa, Rishi).
      const noveltyVoices = new Set([
        "Albert", "Bad News", "Bahh", "Bells", "Boing", "Bubbles", "Cellos",
        "Eddy", "Flo", "Fred", "Good News", "Grandma", "Grandpa", "Jester",
        "Junior", "Kathy", "Organ", "Ralph", "Reed", "Rishi", "Rocko",
        "Sandy", "Shelley", "Superstar", "Tessa", "Trinoids", "Whisper",
        "Wobble", "Zarvox"
      ]);

      // Only neutral English accents — keep US and UK, drop Irish (en-IE),
      // Australian (en-AU), Indian (en-IN), South African (en-ZA), etc.
      const allowedLocales = new Set(["en-us", "en-gb"]);

      const englishVoices = voices.filter(v => {
        const locale = v.lang.toLowerCase().replace("_", "-");
        if (!allowedLocales.has(locale)) return false;
        const baseName = v.name.split(" (")[0].trim();
        return !noveltyVoices.has(baseName);
      });

      englishVoices.forEach((voice, index) => {
        const option = document.createElement("option");
        option.value = voices.indexOf(voice);
        option.textContent = `${voice.name} (${voice.lang})`;
        if (index === 0) option.selected = true;
        voiceSelect.appendChild(option);
      });

      // Restore the previously chosen voice, if it's still available.
      const savedVoice = loadJson(PREFS_STORAGE).voice;
      if (savedVoice) {
        const opt = [...voiceSelect.options].find(o => o.textContent === savedVoice);
        if (opt) voiceSelect.value = opt.value;
      }
    }

    function cleanArticle(raw) {
      // Defensive markdown/preamble stripping (text mode removes most of this,
      // but Jina sometimes still returns markdown or a Title: preamble).
      const stripped = raw
        .replace(/^Title:.*$/gmi, "")
        .replace(/^URL Source:.*$/gmi, "")
        .replace(/^Published Time:.*$/gmi, "")
        .replace(/^Markdown Content:.*$/gmi, "")
        .replace(/!\[[^\]]*\]\([^)]*\)/g, "")
        .replace(/\[([^\]]+)\]\([^)]*\)/g, "$1")
        .replace(/^#{1,6}\s+/gm, "")    // markdown heading markers (not "C#"/"#1")
        .replace(/\*\*|__/g, "");
      const normalized = normalizeForSpeech(stripped);
      // Jina text mode puts each paragraph/heading on its own line. Append a
      // period to lines lacking terminal punctuation (mostly headings and list
      // items) so the voice pauses instead of running them into the next line.
      return normalized
        .split(/\r?\n/)
        .map(l => l.trim())
        .filter(Boolean)
        .map(l => /[.!?…:;)\]"'’”]$/.test(l) ? l : l + ".")
        .join(" ")
        .replace(/\s+/g, " ")
        .trim();
    }

    // Remove leftover bits that get read aloud awkwardly: reference markers,
    // editorial notes, and navigation remnants.
    function normalizeForSpeech(text) {
      return text
        .replace(/\b(?:Jump|Skip) to (?:main )?(?:content|navigation|search)\b/gi, "")
        // Standalone ad/label lines (not the word mid-sentence).
        .replace(/^[ \t]*(?:advertisement|sponsored(?: content)?|promoted content)[ \t]*$/gim, "")
        .replace(/\[\d+\](?:\[\d+\])*/g, "")  // [12] or [12][13] reference marks
        .replace(/\[[^\]]*\b(?:citation|edit|when|update|clarif\w*|source|verification|dead link|page needed|according to whom|by whom|vague|note)\b[^\]]*\]/gi, "")
        .replace(/\[(?:\?|…|\.\.\.)\]/g, "");
    }

    // Build a readable title from a URL slug when Jina gives no Title: line.
    function titleFromUrl(u) {
      try {
        const path = new URL(u).pathname.split("/").filter(Boolean).pop() || "";
        const slug = decodeURIComponent(path)
          .replace(/\.[a-z0-9]+$/i, "")
          .replace(/[-_]+/g, " ")
          .trim();
        return slug ? slug.replace(/\b\w/g, c => c.toUpperCase()) : "Article";
      } catch { return "Article"; }
    }

    function splitText(text, maxLen) {
      const sentences = text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [text];
      const result = [];
      let current = "";

      for (const sentence of sentences) {
        if ((current + sentence).length > maxLen) {
          if (current) result.push(current.trim());
          current = sentence;
        } else {
          current += " " + sentence;
        }
      }

      if (current.trim()) result.push(current.trim());
      return result;
    }

    function selectedVoice() {
      return voices[Number(voiceSelect.value)] || null;
    }

    // Single play/pause toggle, driven by real playback state:
    //   idle    -> disabled, shows ▶
    //   playing -> enabled,  shows ⏸ (click to pause)
    //   paused  -> enabled,  shows ▶ (click to resume)
    function setControls(state) {
      playbackState = state;
      playPauseButton.disabled = state === "idle";
      const playing = state === "playing";
      playPauseButton.textContent = playing ? PAUSE_ICON : PLAY_ICON;
      playPauseButton.setAttribute(
        "aria-label",
        playing ? "Pause" : state === "paused" ? "Resume" : "Play"
      );
      updateNav();
      updateMediaSession();
    }

    function updateNav() {
      // Prev/Next available whenever something is loaded (playing or paused).
      prevButton.disabled = playbackState === "idle" || chunkIndex <= 0;
      nextButton.disabled = playbackState === "idle" || chunkIndex >= chunks.length - 1;
      restartButton.disabled = playbackState === "idle";
    }

    // Render the article into the reading view, one clickable block per chunk.
    function renderChunks() {
      readerEl.innerHTML = "";
      chunkEls = chunks.map((text, i) => {
        const el = document.createElement("span");
        el.className = "chunk";
        el.textContent = text;
        el.addEventListener("click", () => playFrom(i));
        readerEl.appendChild(el);
        return el;
      });
      readerEl.classList.toggle("active", chunks.length > 0);
      progressEl.classList.toggle("active", chunks.length > 0);
      updateProgress();
    }

    function updateProgress() {
      const pct = chunks.length ? ((chunkIndex + 1) / chunks.length) * 100 : 0;
      progressBar.style.width = pct + "%";
      updateEta();
    }

    // Rough estimate of time left, based on characters remaining and speed.
    function updateEta() {
      if (!chunks.length || playbackState === "idle") { etaEl.textContent = ""; return; }
      let remaining = 0;
      for (let i = chunkIndex; i < chunks.length; i++) remaining += chunks[i].length;
      const rate = Number(rateInput.value) || 1;
      const secs = remaining / (CHARS_PER_SEC * rate);
      etaEl.textContent = secs >= 90
        ? `~${Math.round(secs / 60)} min left`
        : `~${Math.max(1, Math.round(secs))} sec left`;
    }

    // --- Per-word highlighting (browser engine) ----------------------------

    // Restore the word-spanned chunk back to plain text.
    function clearWordSpans() {
      if (wordSpanIndex >= 0 && chunkEls[wordSpanIndex]) {
        chunkEls[wordSpanIndex].textContent = chunks[wordSpanIndex];
      }
      currentWordSpans = [];
      wordSpanIndex = -1;
    }

    // Split the active chunk into word spans so onboundary can highlight one.
    function buildWordSpans(index) {
      const el = chunkEls[index];
      if (!el) return;
      const text = chunks[index];
      el.textContent = "";
      const spans = [];
      const re = /\S+/g;
      let m, last = 0;
      while ((m = re.exec(text))) {
        if (m.index > last) el.appendChild(document.createTextNode(text.slice(last, m.index)));
        const span = document.createElement("span");
        span.className = "word";
        span.textContent = m[0];
        el.appendChild(span);
        spans.push({ start: m.index, end: m.index + m[0].length, el: span });
        last = m.index + m[0].length;
      }
      if (last < text.length) el.appendChild(document.createTextNode(text.slice(last)));
      currentWordSpans = spans;
      wordSpanIndex = index;
    }

    function highlightWordAt(charIndex) {
      const w = currentWordSpans.find(s => charIndex >= s.start && charIndex < s.end);
      if (!w) return;
      currentWordSpans.forEach(s => s.el.classList.toggle("word-active", s === w));
    }

    // Highlight the chunk being spoken, scroll it into view, track progress,
    // and remember the position so the article can resume later.
    function highlightChunk(i) {
      clearWordSpans();
      chunkEls.forEach((el, idx) => el.classList.toggle("active", idx === i));
      const el = chunkEls[i];
      if (el) el.scrollIntoView({ block: "center", behavior: "smooth" });
      updateProgress();
      savePosition();
      updateMediaSession();
    }

    function speakChunks() {
      if (chunkIndex >= chunks.length) {
        setStatus("Finished reading.");
        setControls("idle");
        updateNav();
        clearPosition();
        return;
      }

      const utterance = new SpeechSynthesisUtterance(chunks[chunkIndex]);
      utterance.voice = selectedVoice();
      utterance.rate = Number(rateInput.value);
      utterance.pitch = 1;
      utterance.volume = 1;

      // Keep the controls in sync with what the speech engine actually does.
      utterance.onstart = () => { setControls("playing"); updateNav(); };
      utterance.onpause = () => setControls("paused");
      utterance.onresume = () => setControls("playing");

      // Word-level highlight where supported (Android Chrome, desktop).
      // iOS Safari doesn't fire onboundary, so it simply stays chunk-level.
      utterance.onboundary = (event) => {
        if (utterance !== currentUtterance) return;
        if (event.name && event.name !== "word") return;
        highlightWordAt(event.charIndex);
      };

      utterance.onend = () => {
        // Ignore the end event of an utterance we've already replaced (e.g. via
        // prev/next or a re-read) so navigation can't double-advance the index.
        if (utterance !== currentUtterance) return;
        chunkIndex += 1;
        speakChunks();
      };

      utterance.onerror = (event) => {
        // "interrupted"/"canceled" fire on a deliberate skip or re-read; not errors.
        if (event.error === "interrupted" || event.error === "canceled") return;
        if (utterance !== currentUtterance) return;
        setStatus("Speech playback failed. Try another voice.");
        setControls("idle");
      };

      currentUtterance = utterance;
      highlightChunk(chunkIndex);
      buildWordSpans(chunkIndex);  // no-op visually until onboundary fires
      setStatus(`Reading part ${chunkIndex + 1} of ${chunks.length}...`);
      speechSynthesis.speak(utterance);
    }

    // --- Cloudflare engine -------------------------------------------------

    async function fetchCfAudio(text) {
      // Reuse already-generated audio (saves latency and daily quota).
      const cacheKey = cfCacheKey(text);
      if (audioCache.has(cacheKey)) return audioCache.get(cacheKey);

      const key = cfKey.value.trim();
      if (!key) { const e = new Error("no-key"); e.code = "no-key"; throw e; }
      const res = await fetch(CF_WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Access-Key": key },
        body: JSON.stringify({
          model: cfModel.value,
          voice: cfVoice.value,
          text,
          lang: "en",
        }),
      });
      if (res.status === 401) { const e = new Error("unauthorized"); e.code = "unauthorized"; throw e; }
      if (!res.ok) { const e = new Error("server"); e.code = "server"; throw e; }
      const blob = await res.blob();
      cacheAudio(cacheKey, blob);
      return blob;
    }

    function handleCfError(error) {
      if (error.code === "no-key") {
        setStatus("Enter your premium access key.");
        cfKey.focus();
      } else if (error.code === "unauthorized") {
        setStatus("Access key rejected — check your key.");
      } else {
        setStatus("Premium voice failed. Retry, or use a built-in voice.");
      }
      setControls("idle");
    }

    async function playCloudflareChunk() {
      if (chunkIndex >= chunks.length) {
        setStatus("Finished reading.");
        setControls("idle");
        clearPosition();
        return;
      }
      const token = ++cfPlayToken;
      highlightChunk(chunkIndex);
      setStatus(`Generating audio (part ${chunkIndex + 1} of ${chunks.length})...`);
      try {
        const blob = await fetchCfAudio(chunks[chunkIndex]);
        if (token !== cfPlayToken) return;  // superseded by a skip/stop/re-read
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.playbackRate = Number(rateInput.value);
        currentAudio = audio;
        currentObjectUrl = url;

        audio.onended = () => {
          if (token !== cfPlayToken) return;
          URL.revokeObjectURL(url);
          chunkIndex += 1;
          playCloudflareChunk();
        };
        audio.onerror = () => {
          if (token !== cfPlayToken) return;
          handleCfError(new Error("server"));
        };

        await audio.play();
        if (token !== cfPlayToken) return;
        setControls("playing");
        setStatus(`Reading part ${chunkIndex + 1} of ${chunks.length}...`);
        prefetchNext();  // warm the next chunk to avoid an audible gap
      } catch (error) {
        if (token !== cfPlayToken) return;
        handleCfError(error);
      }
    }

    // --- Shared playback ---------------------------------------------------

    // Stop whichever engine is active and invalidate pending async work.
    function stopAll() {
      cfPlayToken++;
      speechSynthesis.cancel();
      currentUtterance = null;
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.onended = null;
        currentAudio.onerror = null;
        currentAudio = null;
      }
      if (currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = null;
      }
      clearWordSpans();
    }

    // Jump to a chunk and play from there (used by prev/next and re-reads).
    function playFrom(index) {
      if (!chunks.length) return;
      chunkIndex = Math.max(0, Math.min(index, chunks.length - 1));
      stopAll();
      setControls("playing");
      if (activeEngine() === "cloudflare") {
        playCloudflareChunk();
      } else {
        speakChunks();
        // If paused before skipping, some engines stay paused after
        // cancel()+speak(); resume() is a no-op when already playing.
        speechSynthesis.resume();
      }
    }

    function readText(text, startIndex = 0) {
      const cleaned = text.replace(/\s+/g, " ").trim();
      if (!cleaned) {
        setStatus("Paste or load article text first.");
        return;
      }
      const engine = activeEngine();
      stopAll();
      chunks = splitText(cleaned, engine === "cloudflare" ? CF_CHUNK : BROWSER_CHUNK);
      chunkIndex = Math.max(0, Math.min(startIndex, chunks.length - 1));
      renderChunks();
      // Optimistically enable controls; the engine confirms "playing".
      setControls("playing");
      if (engine === "cloudflare") {
        playCloudflareChunk();
      } else {
        speakChunks();
      }
    }

    async function loadArticle() {
      const url = urlInput.value.trim();
      if (!/^https?:\/\//i.test(url)) {
        setStatus("Enter a valid article URL starting with http or https.");
        return;
      }

      loadButton.disabled = true;
      setStatus("Extracting article text...");

      try {
        const readerUrl = `https://r.jina.ai/${url}`;
        // Ask Jina for clean plain text without images, and drop common page
        // chrome (nav/header/footer/sidebars) so it isn't read aloud.
        const response = await fetch(readerUrl, {
          headers: {
            "X-Return-Format": "text",
            "X-Retain-Images": "none",
            // Structural landmarks (safe everywhere) + conventional boilerplate
            // class names. Deliberately NOT <table> — old sites use it for layout.
            "X-Remove-Selector": [
              "nav", "header", "footer", "form", "aside",
              "[role=navigation]", "[role=banner]", "[role=contentinfo]",
              "[role=search]", "[role=complementary]", "[role=dialog]",
              ".infobox", ".navbox", ".toc", ".sidebar", ".breadcrumb", ".breadcrumbs",
              ".cookie", ".cookies", ".newsletter", ".advertisement", ".advert", ".ads", ".promo",
              ".social", ".social-share", ".share", ".sharing", ".related", ".related-articles",
            ].join(","),
          },
        });
        if (!response.ok) throw new Error("Could not extract this article.");

        const raw = await response.text();
        const text = cleanArticle(raw);
        if (text.length < 80) throw new Error("The extracted article was too short.");

        // Use Jina's "Title:" line when present; otherwise derive from the URL.
        const titleMatch = raw.match(/^Title:\s*(.+)$/mi);
        articleTitle = titleMatch ? titleMatch[1].trim() : titleFromUrl(url);

        textArea.value = text;
        currentUrl = url;
        // Resume where this article was last left off, if recent.
        const pos = getPosition(url);
        readText(text, pos ? pos.index : 0);
        if (pos && pos.index > 0) {
          setStatus(`Resuming at part ${chunkIndex + 1} of ${chunks.length}...`);
        }
      } catch (error) {
        // Extraction failed -> nothing will play, so make sure controls reflect idle.
        setControls("idle");
        setStatus(`${error.message} Paste the article text below and press "Read pasted text".`);
      } finally {
        loadButton.disabled = false;
      }
    }

    rateInput.addEventListener("input", () => {
      rateValue.textContent = Number(rateInput.value).toFixed(2);
      // Premium audio supports live speed changes; apply instantly.
      if (currentAudio) currentAudio.playbackRate = Number(rateInput.value);
    });

    // speechSynthesis can't change rate mid-utterance, so on release re-speak
    // the current chunk at the new speed (only while actively playing).
    rateInput.addEventListener("change", () => {
      savePrefs();
      if (playbackState === "playing" && activeEngine() === "browser") {
        playFrom(chunkIndex);
      }
    });

    loadButton.addEventListener("click", loadArticle);
    readTextButton.addEventListener("click", () => {
      currentUrl = "";  // pasted text isn't tied to a URL, so don't resume it
      articleTitle = "Pasted text";
      readText(textArea.value);
    });

    // Re-read the already-loaded text when the chosen voice/engine changes —
    // no need to re-fetch from Jina, since the content is in the textarea.
    // Keep the current chunk so a voice/speed swap doesn't restart the article.
    function reReadIfLoaded() {
      if (textArea.value.trim()) readText(textArea.value, chunkIndex);
    }
    voiceSelect.addEventListener("change", () => { savePrefs(); reReadIfLoaded(); });

    function togglePlayPause() {
      if (playbackState === "playing") {
        if (activeEngine() === "cloudflare") {
          if (currentAudio) currentAudio.pause();
        } else {
          speechSynthesis.pause();
        }
        setControls("paused");
      } else if (playbackState === "paused") {
        if (activeEngine() === "cloudflare") {
          if (currentAudio) currentAudio.play();
        } else {
          speechSynthesis.resume();
        }
        setControls("playing");
      }
    }
    playPauseButton.addEventListener("click", togglePlayPause);
    restartButton.addEventListener("click", () => playFrom(0));
    prevButton.addEventListener("click", () => playFrom(chunkIndex - 1));
    nextButton.addEventListener("click", () => playFrom(chunkIndex + 1));

    // Keyboard shortcuts: Space/K play-pause, arrows skip. Ignored while typing.
    document.addEventListener("keydown", (e) => {
      const t = e.target;
      if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" ||
                t.tagName === "SELECT" || t.tagName === "BUTTON" ||
                t.isContentEditable)) return;
      if (playbackState === "idle") return;
      if (e.key === " " || e.key === "k") {
        e.preventDefault();
        togglePlayPause();
      } else if (e.key === "ArrowLeft") {
        e.preventDefault();
        if (!prevButton.disabled) playFrom(chunkIndex - 1);
      } else if (e.key === "ArrowRight") {
        e.preventDefault();
        if (!nextButton.disabled) playFrom(chunkIndex + 1);
      }
    });

    // --- Media Session (lock-screen / headphone controls) ------------------
    // Works for premium audio on all platforms; for the browser voice it
    // appears where the platform attaches a media session to speech.
    function setupMediaSession() {
      if (!("mediaSession" in navigator)) return;
      const ms = navigator.mediaSession;
      const set = (action, fn) => { try { ms.setActionHandler(action, fn); } catch {} };
      set("play", () => { if (playbackState === "paused") togglePlayPause(); });
      set("pause", () => { if (playbackState === "playing") togglePlayPause(); });
      set("previoustrack", () => { if (!prevButton.disabled) playFrom(chunkIndex - 1); });
      set("nexttrack", () => { if (!nextButton.disabled) playFrom(chunkIndex + 1); });
      set("seekbackward", () => { if (!prevButton.disabled) playFrom(chunkIndex - 1); });
      set("seekforward", () => { if (!nextButton.disabled) playFrom(chunkIndex + 1); });
    }

    function updateMediaSession() {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.playbackState =
        playbackState === "playing" ? "playing" :
        playbackState === "paused" ? "paused" : "none";
      if (chunks.length && "MediaMetadata" in window) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: articleTitle || "Article",
          artist: `Part ${chunkIndex + 1} of ${chunks.length}`,
          album: "Article Reader",
        });
      }
    }

    // --- Premium (Cloudflare) controls ------------------------------------

    function populateAuraVoices() {
      const list = cfModel.value === "aura-2" ? AURA2_VOICES : AURA_VOICES;
      cfVoice.innerHTML = "";
      list.forEach((name, i) => {
        const o = document.createElement("option");
        o.value = name;
        o.textContent = name.charAt(0).toUpperCase() + name.slice(1);
        if (i === 0) o.selected = true;
        cfVoice.appendChild(o);
      });
    }

    function syncCfModelUi() {
      // Aura models have selectable voices; MeloTTS does not.
      cfVoice.disabled = cfModel.value === "melotts";
      populateAuraVoices();
    }

    cfEnable.addEventListener("change", () => { savePrefs(); reReadIfLoaded(); });
    cfModel.addEventListener("change", () => { syncCfModelUi(); savePrefs(); reReadIfLoaded(); });
    cfVoice.addEventListener("change", () => { savePrefs(); reReadIfLoaded(); });
    // Persist the access key locally; never leaves this browser except to the Worker.
    cfKey.addEventListener("change", () => {
      localStorage.setItem(CF_KEY_STORAGE, cfKey.value.trim());
    });

    // Restore saved preferences (voice is restored later, in loadVoices).
    const savedPrefs = loadJson(PREFS_STORAGE);
    if (savedPrefs.rate) {
      rateInput.value = savedPrefs.rate;
      rateValue.textContent = Number(savedPrefs.rate).toFixed(2);
    }
    if (typeof savedPrefs.cfEnable === "boolean") cfEnable.checked = savedPrefs.cfEnable;
    if (savedPrefs.cfModel) cfModel.value = savedPrefs.cfModel;
    syncCfModelUi();  // sets the disabled state and populates voices for the model
    if (savedPrefs.cfVoice) cfVoice.value = savedPrefs.cfVoice;  // restore after populate

    cfKey.value = localStorage.getItem(CF_KEY_STORAGE) || "";

    setControls("idle");
    loadVoices();
    speechSynthesis.onvoiceschanged = loadVoices;
    setupMediaSession();
  </script>
</body>
</html>
